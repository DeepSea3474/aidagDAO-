<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDAG DAO - Live Mining</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 1px solid #00ff41; padding: 20px; width: 90%; max-width: 800px; box-shadow: 0 0 15px #00ff41; }
        h1 { text-shadow: 0 0 10px #00ff41; }
        .block { border-bottom: 1px solid #333; padding: 10px 0; }
        .hash { color: #fff; font-size: 0.8em; word-break: break-all; }
        .ceo-msg { font-style: italic; color: #00bcff; margin-top: 5px; }
        .status { animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>🔱 AIDAG DAO CANLI YAYIN</h1>
    <div class="container">
        <p>AĞ DURUMU: <span class="status">AKTİF (POW SLC)</span></p>
        <p>MİMAR: DeepSea3474</p>
        <hr>
        <div id="block-list">
            <p>Veriler yükleniyor...</p>
        </div>
    </div>

    <script>
        async function loadBlocks() {
            try {
                const response = await fetch('blocks.json');
                const data = await response.text();
                const lines = data.trim().split('\n').reverse();
                const list = document.getElementById('block-list');
                list.innerHTML = '';
                
                lines.forEach(line => {
                    const block = JSON.parse(line);
                    const div = document.createElement('div');
                    div.className = 'block';
                    div.innerHTML = `
                        <div>📅 ${block.time}</div>
                        <div class="hash">🔗 Hash: ${block.hash}</div>
                        <div class="ceo-msg">🔱 CEO: ${block.msg}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                document.getElementById('block-list').innerHTML = "Henüz blok kazılmadı veya veri bekleniyor...";
            }
        }
        loadBlocks();
        setInterval(loadBlocks, 30000); // 30 saniyede bir güncelle
    </script>
</body>
</html>
